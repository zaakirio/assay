<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Assay - document extraction you can sign off on">
  <defs>
    <radialGradient id="glow-as" cx="0.22" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#d4a72c" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#d4a72c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-as" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a72c"/>
      <stop offset="1" stop-color="#d4a72c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#181613"/>
  <rect width="1280" height="320" fill="url(#glow-as)"/>

  <!-- faint oversized mark, right side texture -->
  <g transform="translate(1010,36) scale(3.5)" opacity="0.05">
    <circle cx="34" cy="34" r="26" fill="none" stroke="#d4a72c" stroke-width="6"/>
    <path d="M34 12 v14 M34 42 v14 M12 34 h14 M42 34 h14" stroke="#d4a72c" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- mark: crosshair over a document, per-field precision -->
  <g transform="translate(96,110)">
    <rect x="0" y="0" width="52" height="68" rx="5" fill="none" stroke="#d4a72c" stroke-width="5"/>
    <path d="M11 16 h30 M11 30 h30 M11 44 h18" stroke="#d4a72c" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <circle cx="52" cy="52" r="19" fill="#181613" stroke="#d4a72c" stroke-width="5"/>
    <path d="M52 40 v8 M52 56 v8 M40 52 h8 M56 52 h8" stroke="#d4a72c" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="208" y="163" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" letter-spacing="-1" fill="#f2eee5">assay</text>
  <text x="210" y="205" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" fill="#b5ab97">Document extraction you can sign off on.</text>

  <text x="210" y="243" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#7e7663">constrained decoding · per-field precision/recall · confidence routing · human review queue</text>

  <rect x="96" y="272" width="420" height="2" fill="url(#edge-as)"/>
</svg>
